<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Event Footer</title>
    <link rel="stylesheet" href="globaleventfooter.css">
</head>
<body>

    <div style="min-height: 80vh;"></div>

    <footer class="site-footer">
        <div class="footer-container">
            
            <div class="footer-col about">
                <h3>GlobalSummit 2026</h3>
                <p>Connecting innovators across the globe. Join us for the world's largest tech gathering.</p>
            </div>

            <div class="footer-col links">
                <h4>Quick Links</h4>
                <ul>
                    <li><a href="#">Schedule</a></li>
                    <li><a href="#">Speakers</a></li>
                    <li><a href="#">Tickets</a></li>
                    <li><a href="#">Venue</a></li>
                </ul>
            </div>

            <div class="footer-col social">
                <h4>Follow Us</h4>
                <div class="social-icons">
                    <a href="#" class="icon">FB</a>
                    <a href="#" class="icon">TW</a>
                    <a href="#" class="icon">IG</a>
                    <a href="#" class="icon">LI</a>
                </div>
            </div>

            <div class="footer-col newsletter">
                <h4>Newsletter</h4>
                <p>Get updates directly to your inbox.</p>
                <form class="newsletter-form">
                    <input type="email" placeholder="Your Email" required>
                    <button type="submit">Subscribe</button>
                </form>
            </div>

        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Global Events Inc. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
