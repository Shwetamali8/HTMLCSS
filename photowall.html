<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Photo Wall 2026</title>
    <link rel="stylesheet" href="photowall.css">
</head>
<body>

    <header class="gallery-header">
        <h1>Photo<span>Wall</span></h1>
        <p>A completely fluid, breakpoint-free experience.</p>
    </header>

    <main class="photo-wall">
        <div class="photo-item">
            <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=600&q=80" alt="Modern skyscraper glass facade">
            <div class="overlay"><span>View Project</span></div>
        </div>

        <div class="photo-item">
            <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?auto=format&fit=crop&w=600&q=80" alt="Aerial view of green mountains">
            <div class="overlay"><span>Explore</span></div>
        </div>

        <div class="photo-item">
            <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=600&q=80" alt="Close up of circuit board">
            <div class="overlay"><span>Tech Specs</span></div>
        </div>

        <div class="photo-item">
            <img src="https://images.unsplash.com/photo-1449824913935-59a10b8d2000?auto=format&fit=crop&w=600&q=80" alt="Busy city street at night">
            <div class="overlay"><span>City Life</span></div>
        </div>

        <div class="photo-item">
            <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=600&q=80" alt="Minimalist office space">
            <div class="overlay"><span>Interiors</span></div>
        </div>

        <div class="photo-item">
            <img src="https://images.unsplash.com/photo-1473580044384-7ba9967e16a0?auto=format&fit=crop&w=600&q=80" alt="Sand dunes under blue sky">
            <div class="overlay"><span>Journey</span></div>
        </div>

        <div class="photo-item">
            <img src="https://images.unsplash.com/photo-1505118380757-91f5f45d8de4?auto=format&fit=crop&w=600&q=80" alt="Clear blue ocean water">
            <div class="overlay"><span>Marine</span></div>
        </div>

        <div class="photo-item">
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=600&q=80" alt="Sunlight streaming through trees">
            <div class="overlay"><span>Nature</span></div>
        </div>

        <div class="photo-item">
            <img src="https://images.unsplash.com/photo-1541701494587-cb58502866ab?auto=format&fit=crop&w=600&q=80" alt="Abstract colorful paint swirls">
            <div class="overlay"><span>Artistry</span></div>
        </div>

        <div class="photo-item">
            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=600&q=80" alt="Portrait of a man smiling">
            <div class="overlay"><span>People</span></div>
        </div>

        <div class="photo-item">
            <img src="https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?auto=format&fit=crop&w=600&q=80" alt="Milky way galaxy in night sky">
            <div class="overlay"><span>Galaxy</span></div>
        </div>

        <div class="photo-item">
            <img src="https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?auto=format&fit=crop&w=600&q=80" alt="Simple lamp on a table">
            <div class="overlay"><span>Simplicity</span></div>
        </div>
    </main>

    <footer style="text-align: center; padding: 40px; color: #444;">
        <p>&copy; 2026 Creative Studio. Responsive by design.</p>
    </footer>

</body>
</html>
