<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Travel Pack | 2026 Collection</title>
    <link rel="stylesheet" href="productshowcase.css">
</head>
<body>

<main class="product-page">
    <div class="product-container">
        <section class="image-gallery">
            <div class="main-image">
                <img src="https://images.unsplash.com/photo-1553062407-98eeb64c6a62?auto=format&fit=crop&w=800&q=80" alt="Travel Backpack">
            </div>
            <div class="thumbnails">
                <img src="https://images.unsplash.com/photo-1547949003-9792a18a2601?auto=format&fit=crop&w=150&q=80" alt="Side view">
                <img src="https://images.unsplash.com/photo-1509762774605-f07235a08f1f?auto=format&fit=crop&w=150&q=80" alt="Inside view">
                <img src="https://images.unsplash.com/photo-1581605405669-fcdf81165afa?auto=format&fit=crop&w=150&q=80" alt="Back view">
            </div>
        </section>

        <section class="product-details">
            <span class="badge">2026 Limited Edition</span>
            <h1>Nomad Explorer Backpack</h1>
            <p class="price">$189.00</p>
            
            <p class="description">
                Engineered for the modern traveler. Featuring solar-thread charging, 
                RFID protection, and carbon-neutral recycled fabrics. The ultimate 
                companion for your 2026 global adventures.
            </p>

            <div class="options">
                <label>Select Color</label>
                <div class="color-dots">
                    <span class="dot black"></span>
                    <span class="dot olive"></span>
                </div>
            </div>

            <button class="add-to-cart">Add to Cart</button>
        </section>
    </div>
</main>

</body>
</html>
